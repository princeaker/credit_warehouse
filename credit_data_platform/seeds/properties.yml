version: 2

seeds:
  - name: countries
    description: This seed file contains a list of World Bank economies retrieved from 
      the world bank countries api - "https://api.worldbank.org/v2/country?format=json" 
      with their corresponding country codes and regions. In addition, this data is combined 
      with currency data retrieved using pycountry. The script to retrieve and combine the data is 
      located at "credit_warehouse/scripts/generate_countries_data.py".
    config:
      column_types:
        country: varchar(255)
        country_code: varchar(3)
        iso2_code: varchar(2)
        region: varchar(255)
        income_group: varchar(255)
        lending_type: varchar(255)
        currency: varchar(3)
