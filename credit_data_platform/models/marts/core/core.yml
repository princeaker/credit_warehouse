version: 2

models:
  - name: dim_borrowers
    description: This dimension table provides a unique list of borrowers across both IBRD and IDA datasets. The grain is at the borrower level
    columns:
      - name: borrower_id
        data_type: string
        description: A unique identifier for each borrower, generated as a hash of the borrower name to ensure consistency across datasets.
      - name: borrower
        data_type: string
        description: The name of the borrower as reported in the source data.
      - name: country_code
        data_type: string
        description: The standardized country code associated with the borrower, aligned with ISO codes where possible.